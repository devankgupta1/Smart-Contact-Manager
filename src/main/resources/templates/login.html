<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base :: parent(~{::content}, ~{::title}, ~{::script})}">

<head>
    <title>Login - SCM</title>
</head>

<th:block th:fragment="content">

<div class="min-h-[92vh] flex items-center justify-center bg-slate-50 dark:bg-gray-950 px-4 py-6 md:px-6 md:py-12">

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-12 max-w-7xl w-full items-center">

        <div class="w-full max-w-[420px] mx-auto order-2 lg:order-1">
            <div class="bg-white dark:bg-gray-800 p-6 md:p-8 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-700">
                
                <div class="mb-4 md:mb-6 text-center lg:text-left">
                    <h1 class="text-4xl font-extrabold text-blue-600 dark:text-blue-500 tracking-tight">SCM</h1>
                    <p class="text-gray-500 dark:text-gray-400 text-sm font-medium">Welcome back! Please sign in.</p>
                </div>

                <div data-th-replace="message :: messagebox"></div>

                <form th:action="@{/authenticate}" method="post" class="space-y-3 md:space-y-4">

                    <div class="relative">
                        <input type="email" name="email" required placeholder="Email address"
                               class="w-full px-4 py-2.5 md:py-3 border border-gray-300 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 text-black dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    </div>

                    <div class="relative">
                        <input type="password" name="password" required placeholder="Password"
                               class="w-full px-4 py-2.5 md:py-3 border border-gray-300 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 text-black dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    </div>

                    <button type="submit" 
                            class="w-full bg-blue-600 text-white py-2.5 md:py-3 rounded-xl font-bold hover:bg-blue-700 active:scale-[0.98] transition-all shadow-md">
                        Log In
                    </button>

                    <div class="text-center">
                        <a href="#" class="text-xs text-blue-600 dark:text-blue-400 hover:underline">Forgotten password?</a>
                    </div>

                    <div class="relative flex py-2 items-center">
                        <div class="flex-grow border-t border-gray-200 dark:border-gray-700"></div>
                        <span class="flex-shrink mx-4 text-gray-400 text-xs uppercase font-bold">or</span>
                        <div class="flex-grow border-t border-gray-200 dark:border-gray-700"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <a th:href="@{/oauth2/authorization/google}"
                           class="flex items-center justify-center gap-2 border border-gray-300 dark:border-gray-600 p-2 rounded-xl text-sm font-medium dark:text-white hover:bg-gray-50 dark:hover:bg-gray-700 transition-all">
                            <img src="https://www.svgrepo.com/show/355037/google.svg" class="w-4 h-4"> Google
                        </a>

                        <a th:href="@{/oauth2/authorization/github}"
                           class="flex items-center justify-center gap-2 bg-gray-900 text-white p-2 rounded-xl text-sm font-medium hover:bg-black transition-all">
                            <i class="fa-brands fa-github"></i> GitHub
                        </a>
                    </div>

                    <div class="mt-6 pt-4 border-t border-gray-100 dark:border-gray-700 text-center">
                        <span class="text-gray-500 text-xs">New to SCM?</span>
                        <a th:href="@{/signup}" class="ml-1 text-green-600 dark:text-green-400 font-bold text-sm hover:underline">
                            Create Account
                        </a>
                    </div>
                </form>
            </div>
        </div>

        <div class="grid grid-cols-4 grid-rows-2 gap-2 h-[180px] md:h-[350px] lg:h-[500px] order-1 lg:order-2">
            
            <div class="col-span-2 row-span-2 overflow-hidden rounded-2xl border-2 border-white dark:border-gray-800 relative group">
                <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?q=80&w=800" 
                     class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" alt="Connect">
                <div class="absolute inset-0 bg-blue-600/10 flex items-center justify-center group-hover:bg-transparent transition-colors">
                    <span class="text-5xl drop-shadow-lg">🤝</span>
                </div>
            </div>

            <div class="col-span-2 row-span-1 overflow-hidden rounded-2xl border-2 border-white dark:border-gray-800 relative group">
                <img src="https://images.unsplash.com/photo-1516321497487-e288fb19713f?q=80&w=800" 
                     class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" alt="App UI">
                <div class="absolute inset-0 bg-black/20 flex items-center justify-center group-hover:bg-transparent transition-colors">
                    <span class="text-4xl drop-shadow-lg">📱</span>
                </div>
            </div>

            <div class="col-span-1 row-span-1 overflow-hidden rounded-2xl border-2 border-white dark:border-gray-800 relative group">
                <img src="https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?q=80&w=400" 
                     class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" alt="User">
                <div class="absolute inset-0 bg-green-500/10 flex items-center justify-center group-hover:bg-transparent transition-colors">
                    <span class="text-3xl drop-shadow-lg">👤</span>
                </div>
            </div>

            <div class="col-span-1 row-span-1 overflow-hidden rounded-2xl border-2 border-white dark:border-gray-800 relative group">
                <img src="https://images.unsplash.com/photo-1557426272-fc759fbb7a8d?q=80&w=400" 
                     class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" alt="Tech">
                <div class="absolute inset-0 bg-purple-500/10 flex items-center justify-center group-hover:bg-transparent transition-colors">
                    <span class="text-3xl drop-shadow-lg">☁️</span>
                </div>
            </div>
        </div>

    </div>
</div>

</th:block>

<th:block th:fragment="script"></th:block>

</html>
