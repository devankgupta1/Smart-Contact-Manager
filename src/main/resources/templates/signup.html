<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{base :: parent(~{::content}, ~{::title}, ~{::script})}">

<head>
    <title>Signup - SCM</title>
</head>

<th:block th:fragment="content">

    <div class="min-h-[90vh] bg-slate-50 dark:bg-gray-950 flex items-center justify-center px-4 py-10">
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-12 max-w-7xl w-full items-center">

            <div class="grid grid-cols-4 grid-rows-2 gap-3 lg:gap-4 h-[300px] lg:h-[600px] w-full">
                
                <div class="col-span-2 row-span-2 overflow-hidden rounded-2xl shadow-lg border-2 border-white dark:border-gray-800 relative group">
                    <img src="https://images.unsplash.com/photo-1556761175-b413da4baf72?q=80&w=800" 
                         class="w-full h-full object-cover group-hover:scale-110 transition duration-500" alt="Networking">
                    <div class="absolute inset-0 bg-blue-600/10 flex items-center justify-center group-hover:bg-transparent transition-colors">
                        <span class="text-5xl drop-shadow-2xl">🌍</span>
                    </div>
                </div>
                
                <div class="col-span-2 row-span-1 overflow-hidden rounded-2xl shadow-lg border-2 border-white dark:border-gray-800 relative group">
                    <img src="https://images.unsplash.com/photo-1552664730-d307ca884978?q=80&w=800" 
                         class="w-full h-full object-cover group-hover:scale-110 transition duration-500" alt="CRM Interface">
                    <div class="absolute inset-0 bg-indigo-600/10 flex items-center justify-center group-hover:bg-transparent transition-colors">
                        <span class="text-4xl">📊</span>
                    </div>
                </div>
                
                <div class="col-span-1 row-span-1 overflow-hidden rounded-2xl shadow-lg border-2 border-white dark:border-gray-800 relative group">
                    <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?q=80&w=400" 
                         class="w-full h-full object-cover group-hover:scale-110 transition duration-500" alt="Contact">
                    <div class="absolute inset-0 bg-green-600/10 flex items-center justify-center group-hover:bg-transparent transition-colors">
                        <span class="text-2xl">📝</span>
                    </div>
                </div>
                
                <div class="col-span-1 row-span-1 overflow-hidden rounded-2xl shadow-lg border-2 border-white dark:border-gray-800 relative group">
                    <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=400" 
                         class="w-full h-full object-cover group-hover:scale-110 transition duration-500" alt="Security">
                    <div class="absolute inset-0 bg-purple-600/10 flex items-center justify-center group-hover:bg-transparent transition-colors">
                        <span class="text-2xl">🔒</span>
                    </div>
                </div>
            </div>

            <div class="w-full max-w-md mx-auto">
                <div class="text-center lg:text-left mb-6">
                    <h1 class="text-4xl font-extrabold text-blue-600 dark:text-blue-500">SCM</h1>
                    <p class="text-gray-600 dark:text-gray-400 font-medium">Manage your contacts professionally.</p>
                </div>

                <div data-th-replace="message :: messagebox"></div>

                <div class="bg-white dark:bg-gray-800 p-6 lg:p-8 rounded-2xl shadow-2xl border border-gray-100 dark:border-gray-700">
                    <div class="mb-6">
                        <h2 class="text-2xl lg:text-3xl font-extrabold dark:text-white tracking-tight">Create Account</h2>
                        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Start your journey with us today.</p>
                    </div>

                    <form data-th-action="@{'/do-register'}" th:object="${userForm}" method="post" class="space-y-4">

                        <div>
                            <label class="block text-xs font-bold uppercase text-gray-400 mb-1 ml-1">Full Name</label>
                            <input type="text" id="name" th:field="*{name}" placeholder="John Doe" 
                                class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white dark:focus:bg-gray-700 focus:outline-none dark:text-white transition-all">
                        </div>

                        <div>
                            <label class="block text-xs font-bold uppercase text-gray-400 mb-1 ml-1">Email Address</label>
                            <input type="email" id="email" th:field="*{email}" placeholder="name@example.com" 
                                class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white dark:focus:bg-gray-700 focus:outline-none dark:text-white transition-all">
                        </div>

                        <div>
                            <label class="block text-xs font-bold uppercase text-gray-400 mb-1 ml-1">Password</label>
                            <input type="password" id="password" th:field="*{password}" placeholder="••••••••" 
                                class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white dark:focus:bg-gray-700 focus:outline-none dark:text-white transition-all">
                        </div>

                        <div>
                            <label class="block text-xs font-bold uppercase text-gray-400 mb-1 ml-1">Phone Number</label>
                            <input type="text" id="phoneNumber" th:field="*{phoneNumber}" placeholder="+91 98765 43210" 
                                class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white dark:focus:bg-gray-700 focus:outline-none dark:text-white transition-all">
                        </div>

                        <div>
                            <label class="block text-xs font-bold uppercase text-gray-400 mb-1 ml-1">About</label>
                            <textarea rows="2" id="about" th:field="*{about}" placeholder="Tell us a bit about yourself..." 
                                class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white dark:focus:bg-gray-700 focus:outline-none dark:text-white transition-all"></textarea>
                        </div>

                        <div class="grid grid-cols-2 gap-4 pt-4">
                            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-200 dark:shadow-none transition-all active:scale-95">
                                Sign Up
                            </button>
                            <button type="reset" class="bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-200 font-bold py-3 rounded-xl hover:bg-gray-200 dark:hover:bg-gray-600 transition-all">
                                Reset
                            </button>
                        </div>

                    </form>
                    
                    <div class="mt-8 text-center border-t pt-4 dark:border-gray-700">
                        <p class="text-sm text-gray-500">Already have an account?</p>
                        <a th:href="@{'/login'}" class="text-blue-600 dark:text-blue-400 font-bold hover:underline">Log In to SCM</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</th:block>

<th:block th:fragment="script">
    <script>
        console.log("Signup Page with Contact-App Visuals loaded.");
    </script>
</th:block>

</html>
