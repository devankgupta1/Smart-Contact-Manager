<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="messagebox"
     th:if="${registerMessage != null}"
     class="flex items-center gap-2 p-4 mb-4 text-sm rounded-lg
            bg-green-100 text-green-800 border border-green-300"
     role="alert">

    <strong class="font-semibold">Success:</strong>
    <span th:text="${registerMessage.content}"></span>

</div>

</body>
</html>
