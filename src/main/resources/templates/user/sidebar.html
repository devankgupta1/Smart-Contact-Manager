<aside th:fragment="sidebar" id="logo-sidebar"
       class="w-64 fixed h-screen top-0 left-0 z-40
       transform -translate-x-full md:translate-x-0
       transition-all duration-300 ease-in-out
       bg-white dark:bg-gray-900"
       aria-label="Sidebar">

  <div class="h-full px-4 py-4 overflow-y-auto border-r
              border-gray-200 dark:border-gray-700">

    <!-- Logo -->
    <a th:href="@{'/home'}"
       class="flex items-center gap-2 ps-2.5 mt-5 mb-8 hover:scale-105 transition">
      <img src="https://flowbite.com/docs/images/logo.svg"
           class="h-6" alt="Logo" />
      <span class="text-lg font-semibold text-gray-800 dark:text-gray-200">
        Welcome to SCM
      </span>
    </a>

    <!-- Menu -->
    <ul class="space-y-2 font-medium text-gray-800 dark:text-gray-200">

      <li>
        <a th:href="@{'/user/dashboard'}"
           class="flex items-center px-3 py-2.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800">
          <i class="fa-regular fa-chart-bar"></i>
          <span class="ms-3">Dashboard</span>
        </a>
      </li>

      <li>
        <a th:href="@{'/user/profile'}"
           class="flex items-center px-3 py-2.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800">
          <i class="fa-solid fa-user"></i>
          <span class="ms-3">Profile</span>
        </a>
      </li>

      <li>
        <a th:href="@{'/user/contact/add'}"
           class="flex items-center px-3 py-2.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800">
          <i class="fa-solid fa-user-plus"></i>
          <span class="ms-3">Add Contact</span>
        </a>
      </li>

      <li>
        <a th:href="@{'/user/contact'}"
           class="flex items-center px-3 py-2.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800">
          <i class="fa-regular fa-address-book"></i>
          <span class="ms-3">Contact</span>
        </a>
      </li>

    </ul>
  </div>
</aside>

<!-- Overlay -->
<div id="sidebarOverlay"
     class="fixed inset-0 bg-black bg-opacity-50 hidden z-30 md:hidden"></div>
