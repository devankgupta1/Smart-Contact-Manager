<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="base :: parent(~{::content}, ~{::title}, ~{::script})">

<head>
    <title th:fragment="title">Contact Page - SCM</title>
</head>

<body>

    

    <div th:fragment="content">
        <div th:if="${LoggedInUser}" th:replace="user/sidebar :: sidebar"></div>

        <div class="ml-0 md:ml-64 pt-16 p-4 md:p-6 min-h-screen bg-gray-50 dark:bg-gray-950 transition-all duration-300">

            <div class="mb-6">
                <h1 class="text-2xl md:text-4xl font-bold text-gray-800 dark:text-white">Welcome to Contact Page</h1>
                <p class="mt-2 text-gray-600 dark:text-gray-400">Manage and view all your saved contacts here.</p>
            </div>

            <!-- ✅ YAHI PASTE KAR -->
<div class="flex justify-end mb-4">

    <form th:action="@{/user/contact}" method="get">

        <input type="hidden" name="page" th:value="${pageContact.number}">

        <label class="text-sm mr-2 text-gray-500">Show:</label>

        <select name="size"
                class="border rounded-lg px-2 py-1 text-sm"
                onchange="this.form.submit()">

            <option value="3" th:selected="${param.size == null || param.size == '3'}">3</option>
            <option value="5" th:selected="${param.size == '5'}">5</option>
            <option value="10" th:selected="${param.size == '10'}">10</option>
            <option value="20" th:selected="${param.size == '20'}">20</option>

        </select>

    </form>

</div>

            <!-- SEARCH (UNCHANGED) -->
            <form th:action="@{/user/contact/search}" method="get" class="mb-8">
                <div
                    class="bg-white dark:bg-gray-900 shadow-sm border border-gray-200 dark:border-gray-800 p-4 md:p-5 rounded-xl">
                    <div class="flex flex-col sm:flex-row gap-3 sm:items-center">

                        <select name="field" class="h-11 px-4 text-sm border border-gray-300 rounded-lg 
                               bg-white dark:bg-gray-800 dark:border-gray-700 dark:text-white 
                               focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all w-full sm:w-auto">
                            <option value="">Select Field</option>
                            <option value="name">Name</option>
                            <option value="phone">Phone</option>
                            <option value="email">Email</option>
                        </select>

                        <div class="relative flex-grow w-full sm:max-w-md">
                            <input type="text" name="keyword" class="h-11 w-full pl-4 pr-10 text-sm border border-gray-300 rounded-lg 
                                   bg-gray-50 dark:bg-gray-800 dark:border-gray-700 dark:text-white 
                                   focus:ring-2 focus:ring-blue-500 focus:outline-none"
                                placeholder="Search for contacts...">
                        </div>

                        <button type="submit"
                            class="h-11 px-6 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow-md transition-all active:scale-95 w-full sm:w-auto">
                            Search
                        </button>
                    </div>
                </div>
            </form>

            <!-- TABLE -->
            <div class="relative overflow-x-auto shadow-md sm:rounded-xl border border-gray-200 dark:border-gray-800">
                <table class="w-full min-w-[600px] text-sm text-left text-gray-500 dark:text-gray-400">

                    <!-- HEADER (CHECKBOX REMOVED) -->
                    <thead
                        class="text-xs text-gray-700 uppercase bg-gray-100 dark:bg-gray-800 dark:text-gray-300 border-b dark:border-gray-700">
                        <tr>
                            <th class="px-6 py-4">Name</th>
                            <th class="px-6 py-4">Phone</th>
                            <th class="px-6 py-4">Links</th>
                            <th class="px-6 py-4">Action</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="c : ${pageContact.getContent()}"
                            class="bg-white dark:bg-gray-900 border-b dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors">

                            <!-- NAME (NO CHECKBOX COLUMN) -->
                            <th scope="row"
                                class="flex items-center px-6 py-4 text-gray-900 dark:text-white whitespace-nowrap">
                                <div class="relative">
                                    <img onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'"
                                        th:src="@{*{c.pictures}}"
                                        class="w-10 h-10 rounded-full border-2 border-gray-200 dark:border-gray-700 object-cover">

                                    <i th:if="${c.favorite}"
                                       class="fa-solid fa-star text-yellow-400 absolute -top-1 -right-1 text-xs bg-white rounded-full"></i>
                                </div>

                                <div class="ps-3">
                                    <div class="text-base font-bold" th:text="${c.name}"></div>
                                    <div class="text-xs text-gray-500 dark:text-gray-400"
                                         th:text="${c.email}"></div>
                                </div>
                            </th>

                            <!-- PHONE -->
                            <td class="px-6 py-4 font-medium text-gray-700 dark:text-gray-300">
                                <i class="fa-solid fa-phone mr-2 text-gray-400 text-xs"></i>
                                <span th:text="${c.phoneNumber}"></span>
                            </td>

                            <!-- LINKS -->
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-4 text-lg">
                                    <a th:href="${c.linkedInLink}" class="text-blue-600 hover:scale-125">
                                        <i class="fa-brands fa-linkedin"></i>
                                    </a>
                                    <a th:href="${c.githubLink}" class="hover:scale-125">
                                        <i class="fa-brands fa-github"></i>
                                    </a>
                                    <a th:href="${c.websiteLink}" class="hover:scale-125">
                                        <i class="fa-solid fa-link"></i>
                                    </a>
                                </div>
                            </td>

                            <!-- ACTION -->
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-4">
                                    <button th:attr="onclick='loadContact(\'' + ${c.id} + '\')'"
                                        class="text-blue-500 hover:scale-125">
                                        <i class="fa-solid fa-eye"></i>
                                    </button>

                                    <a th:href="@{'/user/contact/view/' + ${c.id}}" class="text-green-500">
                                        <i class="fa-solid fa-pen-to-square"></i>
                                    </a>

                                    <button th:attr="onclick='deleteContact(\'' + ${c.id} + '\')'"
                                        class="text-red-500">
                                        <i class="fa-regular fa-trash-can"></i>
                                    </button>
                                </div>
                            </td>

                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- MODAL -->
            <div class="mt-8 flex justify-center">
                <div th:replace="~{user/contact_modals :: contact}"></div>
            </div>

            <!-- PAGINATION (UNCHANGED) -->
            <div class="flex justify-center items-center w-full my-10">
                <nav aria-label="Pagination">
                    <ul class="inline-flex -space-x-px text-sm border border-gray-300 dark:border-gray-700 rounded-full overflow-hidden bg-white dark:bg-gray-800 shadow-md">

                        <li>
                            <a th:unless="${pageContact.first}"
                               th:href="@{'/user/contact?page=' + ${pageContact.number - 1}}"
                               class="flex items-center justify-center px-4 h-10">
                                Previous
                            </a>
                        </li>

                        <li th:each="i, stat : ${#numbers.sequence(0, pageContact.totalPages - 1)}">
                            <a th:href="@{'/user/contact?page=' + ${i}}"
                               th:text="${stat.count}"
                               class="flex items-center justify-center w-10 h-10">
                            </a>
                        </li>

                        <li>
                            <a th:unless="${pageContact.last}"
                               th:href="@{'/user/contact?page=' + ${pageContact.number + 1}}"
                               class="flex items-center justify-center px-4 h-10">
                                Next
                            </a>
                        </li>

                    </ul>
                </nav>
            </div>

        </div>

    </div>

    <script th:src="@{/js/contact.js}"></script>

</body>
</html>
