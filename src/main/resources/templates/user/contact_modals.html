<div th:fragment="contact">
    <div id="view_contact_modal" tabindex="-1" aria-hidden="true" 
        class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-2 sm:p-4 overflow-y-auto">

        <!-- CONTAINER -->
        <div class="relative w-full max-w-2xl mx-auto">

            <div class="relative bg-white rounded-2xl shadow-2xl dark:bg-gray-800 border-t-4 border-blue-600 dark:border-blue-500 overflow-hidden">

                <!-- HEADER -->
                <div class="p-3 sm:p-4 border-b dark:border-gray-700 bg-gray-50 dark:bg-gray-700/50 flex justify-between items-center">
                    <h3 class="text-sm sm:text-xl font-bold text-gray-900 dark:text-white flex items-center gap-2">
                        <i class="fa-solid fa-user-tie"></i> 
                        <span class="hidden sm:inline">Contact ID:</span> 
                        <span id="contact-id" class="text-xs sm:text-sm font-mono text-gray-500"></span>
                    </h3>
                    <button type="button" class="text-gray-400 hover:text-gray-900 dark:hover:text-white" data-modal-hide="view_contact_modal">
                        <i class="fa-solid fa-xmark text-lg sm:text-xl"></i>
                    </button>
                </div>

                <!-- BODY -->
                <div class="p-4 sm:p-6 space-y-4 sm:space-y-6">

                    <!-- PROFILE -->
                    <div class="flex flex-col sm:flex-row items-center gap-4 sm:gap-6 bg-blue-50/50 dark:bg-blue-900/20 p-3 sm:p-4 rounded-xl border">
                        <img id="contact-image" 
                             class="w-20 h-20 sm:w-24 sm:h-24 rounded-full shadow-lg object-cover border-4 border-white dark:border-gray-700" />

                        <div class="text-center sm:text-left">
                            <h4 id="contact-name" class="text-lg sm:text-2xl font-bold text-gray-900 dark:text-white"></h4>
                            <p id="contact-email" class="text-blue-600 text-sm sm:text-base"></p>

                            <div id="contact-favorite" class="mt-2 hidden">
                                <span class="text-xs px-2 py-1 bg-yellow-100 text-yellow-800 rounded-full">
                                    ⭐ Favorite
                                </span>
                            </div>
                        </div>
                    </div>

                    <!-- INFO GRID -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">

                        <div class="flex items-center gap-3 p-3 bg-gray-50 dark:bg-gray-700/50 rounded-lg">
                            <i class="fa-solid fa-phone text-blue-500"></i>
                            <div>
                                <p class="text-xs text-gray-500">Phone</p>
                                <p id="contact-phone" class="text-sm font-semibold"></p>
                            </div>
                        </div>

                        <div class="flex items-center gap-3 p-3 bg-gray-50 dark:bg-gray-700/50 rounded-lg">
                            <i class="fa-solid fa-location-dot text-red-500"></i>
                            <div>
                                <p class="text-xs text-gray-500">Address</p>
                                <p id="contact-address" class="text-sm font-semibold"></p>
                            </div>
                        </div>

                    </div>

                    <!-- DESCRIPTION -->
                    <div class="p-3 sm:p-4 bg-gray-50 dark:bg-gray-700/50 rounded-lg">
                        <p class="text-xs text-gray-500 mb-1">Description</p>
                        <p id="contact-description" class="text-sm italic"></p>
                    </div>

                    <!-- LINKS -->
                    <div class="space-y-2">
                        <p class="text-xs text-gray-500 border-b pb-1">Links</p>

                        <div class="flex flex-wrap gap-2">

                            <a id="contact-website" target="_blank"
                                class="px-3 py-1.5 text-xs border rounded-lg">
                                🌐 Website
                            </a>

                            <a id="contact-github" target="_blank"
                                class="px-3 py-1.5 text-xs border rounded-lg">
                                💻 GitHub
                            </a>

                            <a id="contact-linkedin" target="_blank"
                                class="px-3 py-1.5 text-xs border rounded-lg">
                                🔗 LinkedIn
                            </a>

                        </div>
                    </div>

                    <!-- EXTRA LINKS -->
                    <div id="custom-links-container" class="hidden space-y-2">
                        <p class="text-xs text-gray-500 border-b pb-1">More Links</p>
                        <div id="contact-links-list" class="flex flex-wrap gap-2"></div>
                    </div>

                </div>

                <!-- FOOTER -->
                <div class="p-3 sm:p-4 text-center bg-gray-50 dark:bg-gray-700/50">
                    <button data-modal-hide="view_contact_modal"
                        class="px-6 sm:px-8 py-2 bg-black text-white rounded-full text-sm">
                        Close
                    </button>
                </div>

            </div>
        </div>
    </div>
</div>
